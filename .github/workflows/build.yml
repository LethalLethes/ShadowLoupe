name: Build Loupe IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node & build React ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build React app
        working-directory: react-source
        run: |
          # Replace catalog: and workspace: deps, remove Replit-only packages
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));

            const catalog = {
              '@tailwindcss/vite': '^4.1.14',
              '@tanstack/react-query': '^5.90.21',
              '@types/node': '^25.3.3',
              '@types/react': '^19.2.0',
              '@types/react-dom': '^19.2.0',
              '@vitejs/plugin-react': '^5.0.4',
              'class-variance-authority': '^0.7.1',
              'clsx': '^2.1.1',
              'framer-motion': '^12.23.24',
              'lucide-react': '^0.545.0',
              'react': '19.1.0',
              'react-dom': '19.1.0',
              'tailwind-merge': '^3.3.1',
              'tailwindcss': '^4.1.14',
              'vite': '^7.3.2',
              'wouter': '^3.3.5',
              'zod': '^3.25.76',
            };

            const removePackages = [
              '@workspace/api-client-react',
              '@replit/vite-plugin-cartographer',
              '@replit/vite-plugin-dev-banner',
              '@replit/vite-plugin-runtime-error-modal',
            ];

            for (const section of ['dependencies', 'devDependencies']) {
              if (!pkg[section]) continue;
              for (const [name, ver] of Object.entries(pkg[section])) {
                if (removePackages.includes(name)) {
                  delete pkg[section][name];
                } else if (ver === 'catalog:') {
                  if (catalog[name]) {
                    pkg[section][name] = catalog[name];
                  } else {
                    console.warn('Unknown catalog entry: ' + name + ', removing');
                    delete pkg[section][name];
                  }
                } else if (typeof ver === 'string' && ver.startsWith('workspace:')) {
                  delete pkg[section][name];
                }
              }
            }

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json updated successfully');
          "
          npm install --legacy-peer-deps
          npm run build

      # ── 3. Copy dist into Swift project ───────────────────────────────────
      - name: Copy React dist to Swift bundle
        run: |
          cp -r react-source/dist LoupeApp/LoupeApp/dist

      # ── 4. Select Xcode ────────────────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      # ── 5. Build unsigned .xcarchive ──────────────────────────────────────
      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project LoupeApp/LoupeApp.xcodeproj \
            -scheme LoupeApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/Loupe.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      # ── 6. Package .ipa manually ──────────────────────────────────────────
      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/Loupe.xcarchive -name "*.app" | head -1)
          echo "Found app: $APP_PATH"

          mkdir -p /tmp/ipa_stage/Payload
          cp -r "$APP_PATH" /tmp/ipa_stage/Payload/

          cd /tmp/ipa_stage
          zip -r Loupe.ipa Payload/
          echo "IPA created: $(du -sh Loupe.ipa)"

      # ── 7. Upload IPA ──────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Loupe-${{ github.run_number }}.ipa
          path: /tmp/ipa_stage/Loupe.ipa
          retention-days: 30
